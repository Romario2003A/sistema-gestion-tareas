<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
        }
        .btn-premium { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="text-slate-800 min-h-screen p-4 md:p-8 flex justify-center">
    <div class="w-full max-w-3xl">
        
        <header class="mb-12 mt-6 text-center md:text-left">
            <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-slate-900">Tareas</h1>
            <p class="text-slate-500 mt-2 font-medium">Gestión minimalista conectada a MySQL</p>
        </header>

        <div class="glass-card p-6 md:p-8 rounded-3xl mb-10">
            <form action="/crear" method="POST" class="space-y-5">
                <div>
                    <input type="text" name="titulo" placeholder="Ej. Terminar el CRUD de Flask..." required
                        class="w-full bg-white/50 border border-slate-200 text-slate-900 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all placeholder-slate-400 font-medium">
                </div>
                <div>
                    <textarea name="descripcion" placeholder="Añade contexto adicional aquí..." required rows="2"
                        class="w-full bg-white/50 border border-slate-200 text-slate-900 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all placeholder-slate-400 resize-none"></textarea>
                </div>
                <div class="flex justify-end pt-2">
                    <button type="submit" class="w-full md:w-auto bg-slate-900 text-white font-semibold py-3.5 px-8 rounded-2xl btn-premium">
                        + Guardar Tarea
                    </button>
                </div>
            </form>
        </div>

        <div class="space-y-4">
            {% for tarea in tareas %}
            <div class="glass-card p-5 md:p-6 rounded-3xl flex flex-col md:flex-row justify-between md:items-center gap-5 transition-all hover:bg-white">
                <div class="flex-1 pr-4">
                    <h3 class="text-lg font-semibold {% if tarea.estado == 'Completada' %} line-through text-slate-400 {% else %} text-slate-800 {% endif %}">
                        {{ tarea.titulo }}
                    </h3>
                    <p class="text-slate-500 mt-1 text-sm">{{ tarea.descripcion }}</p>
                </div>
                
                <div class="flex space-x-3 shrink-0 pt-3 md:pt-0 border-t border-slate-100 md:border-none">
                    <form action="/actualizar/{{ tarea.id }}" method="POST">
                        <button type="submit" class="text-sm font-semibold bg-white border border-slate-200 text-slate-700 px-4 py-2 rounded-xl btn-premium flex items-center">
                            {% if tarea.estado == 'Pendiente' %} ✓ Listo {% else %} ↺ Deshacer {% endif %}
                        </button>
                    </form>
                    <form action="/eliminar/{{ tarea.id }}" method="POST" onsubmit="return confirm('¿Eliminar definitivamente?');">
                        <button type="submit" class="text-sm font-semibold bg-red-50 text-red-600 px-4 py-2 rounded-xl btn-premium">
                            Eliminar
                        </button>
                    </form>
                </div>
            </div>
            {% else %}
            <div class="text-center py-16 px-4">
                <h3 class="text-slate-400 font-medium text-lg">Todo al día</h3>
                <p class="text-slate-400 text-sm mt-1">No hay tareas pendientes en la base de datos.</p>
            </div>
            {% endfor %}
        </div>
        
    </div>
</body>
</html>
